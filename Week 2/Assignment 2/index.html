<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day 1: Assignment-2 Mini Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #fff;
      color: #111;
    }

    h3 {
      font-size: 14px;
      font-weight: normal;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-row input {
      padding: 10px 14px;
      font-size: 15px;
      border: 1px solid #aaa;
      width: 220px;
      color: #888;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .btn-row button {
      padding: 8px 22px;
      font-size: 15px;
      border: 1px solid #aaa;
      background: #fff;
      cursor: pointer;
      border-radius: 2px;
    }

    .btn-row button:hover {
      background: #f0f0f0;
    }

    .answer-section {
      border-bottom: 1px solid #ccc;
      padding-bottom: 8px;
    }

    .answer-section p {
      font-size: 14px;
      color: #555;
      margin: 0 0 6px;
    }

    #result {
      font-size: 16px;
      color: #111;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h3>Day 1: Assignment-2 &nbsp; Mini Calculator &nbsp; Github Repo Link <span style="color:red">*</span></h3>

  <div class="input-row">
    <input type="number" id="num1" placeholder="enter 1st Number" />
    <input type="number" id="num2" placeholder="enter 2nd Number" />
  </div>

  <div class="btn-row">
    <button onclick="calculate('add')">Add</button>
    <button onclick="calculate('subtract')">Subtract</button>
    <button onclick="calculate('multiply')">Multiply</button>
    <button onclick="calculate('divide')">Divide</button>
  </div>

  <div class="answer-section">
    <p>Your answer</p>
    <p id="result"></p>
  </div>

  <script>
    function calculate(op) {
      const n1 = parseFloat(document.getElementById('num1').value);
      const n2 = parseFloat(document.getElementById('num2').value);
      const resultEl = document.getElementById('result');

      if (isNaN(n1) || isNaN(n2)) {
        resultEl.textContent = 'Please enter both numbers.';
        return;
      }

      let answer;
      if (op === 'add')      answer = n1 + n2;
      if (op === 'subtract') answer = n1 - n2;
      if (op === 'multiply') answer = n1 * n2;
      if (op === 'divide') {
        if (n2 === 0) { resultEl.textContent = 'Cannot divide by zero.'; return; }
        answer = n1 / n2;
      }

      resultEl.textContent = answer;
    }
  </script>

</body>
</html>
